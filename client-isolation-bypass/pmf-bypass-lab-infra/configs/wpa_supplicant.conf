# ==============================================================================
# wpa_supplicant.conf — Client station configuration
# Connects to the baseline secure AP with PMF support.
# ==============================================================================

ctrl_interface=DIR=/var/run/wpa_supplicant GROUP=netdev
update_config=1
country=PL

# ---- Secure Baseline Network (PMF required) ----
network={
    ssid="PMF_Lab_Secure"
    psk="LabTest123!"

    # WPA2-CCMP
    proto=RSN
    key_mgmt=WPA-PSK
    pairwise=CCMP
    group=CCMP

    # PMF: 'required' to match AP's ieee80211w=2
    ieee80211w=2
}
