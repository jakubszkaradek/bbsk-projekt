# ==============================================================================
# hostapd.conf — PMF Bypass Lab (Baseline Secure AP)
#
# Key settings:
#   ieee80211w=2     → PMF required (Protected Management Frames, 802.11w)
#   ap_isolate=1     → Client Isolation (L2 traffic blocked between stations)
#
# This config represents the "secure baseline" that attacks will target.
# ==============================================================================

# ---------- Physical / Virtual Interface ----------
interface=ap1-wlan1
driver=nl80211

# ---------- SSID & Operation ----------
ssid=PMF_Lab_Secure
hw_mode=g
channel=6

# ---------- WPA2-PSK Security ----------
wpa=2
wpa_passphrase=LabTest123!
wpa_key_mgmt=WPA-PSK
wpa_pairwise=CCMP
rsn_pairwise=CCMP

# ---------- PMF (802.11w) — Protected Management Frames ----------
# 0 = disabled, 1 = optional, 2 = required
# Using '2' means stations that don't support PMF will be REJECTED.
ieee80211w=2

# ---------- Client Isolation (L2) ----------
# Prevents direct communication between associated stations.
# Stations can only talk to the AP/gateway, not to each other.
ap_isolate=1

# ---------- Beacon & Timing ----------
beacon_int=100
dtim_period=2

# ---------- Logging ----------
logger_syslog=-1
logger_syslog_level=2
logger_stdout=-1
logger_stdout_level=2

# ---------- Station Limits ----------
max_num_sta=10

# ---------- MAC Address ACL (disabled for baseline) ----------
# Uncomment and set to 1 for MAC filtering.
# macaddr_acl=0
# accept_mac_file=/etc/hostapd/accept_mac
