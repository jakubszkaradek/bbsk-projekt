# ==============================================================================
# Kismet Configuration — Passive Wireless IDS for PMF Bypass Lab
#
# Kismet operates in monitor mode, logging all observed wireless events.
# Used here as a WIDS (Wireless Intrusion Detection System) to detect:
#   - Unexpected deauthentication floods
#   - Channel switch anomalies
#   - Rogue AP detection
#   - MAC address spoofing
#
# This config minimizes overhead — Kismet logs to SQLite for post-analysis.
# ==============================================================================

# ---- Server Settings ----
# Bind only to localhost (no remote access needed)
httpd_host=127.0.0.1
httpd_port=2501

# ---- Logging ----
# SQLite backend for lightweight structured logging
log_types=kismet
log_prefix=/tmp/kismet_logs/

# ---- Source (Monitor Interface) ----
# Set this to the monitor interface created by Mininet-WiFi (e.g., ap1-mp1)
# ncsource=ap1-mp1:type=linuxwifi
# (Uncomment and set via command line: kismet -c ap1-mp1)

# ---- Alert Tuning ----
# Enable alerts for PMF-relevant events:

# Alert on deauthentication floods (>5 deauths in 10 seconds from same source)
alert=DEAUTHFLOOD,10,5

# Alert on channel changes
alert=CHANCHANGE,5,3

# Alert on disassociation floods
alert=DISASSOCTRAFFIC,10,5

# Alert on AP spoofing (multiple APs claiming same BSSID)
alert=APSPOOF,10,1

# ---- GPS (Disabled) ----
gps=no

# ---- Logging Detail ----
# Log all management frames for analysis
kismet_log_alerts=1

# ---- Performance ----
# Limit memory usage
tracker_device_timeout=300
